<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heroes 5 — Редактор Дуэль-Пресетов</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>⚔️ Heroes 5 — Редактор Дуэль-Пресетов</h1>
            <div class="header-controls">
                <button onclick="savePreset()" class="btn btn-save">💾 Сохранить</button>
                <button onclick="showLoadDialog()" class="btn btn-load">📂 Загрузить</button>
                <button onclick="exportPreset()" class="btn btn-export">📤 Экспорт</button>
                <button onclick="importPreset()" class="btn btn-import">📥 Импорт</button>
                <button onclick="resetPreset()" class="btn btn-reset">🔄 Сброс</button>
            </div>
        </header>

        <main class="duel-layout">
            <!-- Player 1 -->
            <section class="player-panel" id="player1-panel">
                <div class="player-header player1-header">
                    <h2>Игрок 1</h2>
                    <input type="text" id="player1-name" placeholder="Имя игрока" value="Игрок 1" class="player-name-input">
                </div>

                <div class="hero-section">
                    <h3>Герой</h3>
                    <div class="hero-config">
                        <div class="hero-level">
                            <label>Уровень:</label>
                            <input type="number" id="player1-hero-level" min="1" max="50" value="1"
                                   onchange="updateHeroStats(1)">
                        </div>
                        <div class="primary-stats">
                            <div class="stat-row">
                                <label>Атака:</label>
                                <input type="number" id="player1-hero-attack" min="0" max="99" value="0">
                            </div>
                            <div class="stat-row">
                                <label>Защита:</label>
                                <input type="number" id="player1-hero-defense" min="0" max="99" value="0">
                            </div>
                            <div class="stat-row">
                                <label>Сила магии:</label>
                                <input type="number" id="player1-hero-spellpower" min="0" max="99" value="0">
                            </div>
                            <div class="stat-row">
                                <label>Знание:</label>
                                <input type="number" id="player1-hero-knowledge" min="0" max="99" value="0">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="army-section">
                    <h3>Армия</h3>
                    <div class="faction-selector">
                        <label>Фракция:</label>
                        <select id="player1-faction" onchange="loadCreatures(1)">
                            <option value="">— Выберите фракцию —</option>
                        </select>
                    </div>
                    <div class="army-slots" id="player1-army">
                        <div class="army-slot" data-player="1" data-slot="0" onclick="openCreatureSelector(1, 0)">
                            <div class="slot-empty">+</div>
                        </div>
                        <div class="army-slot" data-player="1" data-slot="1" onclick="openCreatureSelector(1, 1)">
                            <div class="slot-empty">+</div>
                        </div>
                        <div class="army-slot" data-player="1" data-slot="2" onclick="openCreatureSelector(1, 2)">
                            <div class="slot-empty">+</div>
                        </div>
                        <div class="army-slot" data-player="1" data-slot="3" onclick="openCreatureSelector(1, 3)">
                            <div class="slot-empty">+</div>
                        </div>
                        <div class="army-slot" data-player="1" data-slot="4" onclick="openCreatureSelector(1, 4)">
                            <div class="slot-empty">+</div>
                        </div>
                        <div class="army-slot" data-player="1" data-slot="5" onclick="openCreatureSelector(1, 5)">
                            <div class="slot-empty">+</div>
                        </div>
                        <div class="army-slot" data-player="1" data-slot="6" onclick="openCreatureSelector(1, 6)">
                            <div class="slot-empty">+</div>
                        </div>
                    </div>
                    <div class="army-power" id="player1-power">Сила армии: 0</div>
                </div>
            </section>

            <!-- VS divider -->
            <div class="vs-divider">
                <span>VS</span>
            </div>

            <!-- Player 2 -->
            <section class="player-panel" id="player2-panel">
                <div class="player-header player2-header">
                    <h2>Игрок 2</h2>
                    <input type="text" id="player2-name" placeholder="Имя игрока" value="Игрок 2" class="player-name-input">
                </div>

                <div class="hero-section">
                    <h3>Герой</h3>
                    <div class="hero-config">
                        <div class="hero-level">
                            <label>Уровень:</label>
                            <input type="number" id="player2-hero-level" min="1" max="50" value="1"
                                   onchange="updateHeroStats(2)">
                        </div>
                        <div class="primary-stats">
                            <div class="stat-row">
                                <label>Атака:</label>
                                <input type="number" id="player2-hero-attack" min="0" max="99" value="0">
                            </div>
                            <div class="stat-row">
                                <label>Защита:</label>
                                <input type="number" id="player2-hero-defense" min="0" max="99" value="0">
                            </div>
                            <div class="stat-row">
                                <label>Сила магии:</label>
                                <input type="number" id="player2-hero-spellpower" min="0" max="99" value="0">
                            </div>
                            <div class="stat-row">
                                <label>Знание:</label>
                                <input type="number" id="player2-hero-knowledge" min="0" max="99" value="0">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="army-section">
                    <h3>Армия</h3>
                    <div class="faction-selector">
                        <label>Фракция:</label>
                        <select id="player2-faction" onchange="loadCreatures(2)">
                            <option value="">— Выберите фракцию —</option>
                        </select>
                    </div>
                    <div class="army-slots" id="player2-army">
                        <div class="army-slot" data-player="2" data-slot="0" onclick="openCreatureSelector(2, 0)">
                            <div class="slot-empty">+</div>
                        </div>
                        <div class="army-slot" data-player="2" data-slot="1" onclick="openCreatureSelector(2, 1)">
                            <div class="slot-empty">+</div>
                        </div>
                        <div class="army-slot" data-player="2" data-slot="2" onclick="openCreatureSelector(2, 2)">
                            <div class="slot-empty">+</div>
                        </div>
                        <div class="army-slot" data-player="2" data-slot="3" onclick="openCreatureSelector(2, 3)">
                            <div class="slot-empty">+</div>
                        </div>
                        <div class="army-slot" data-player="2" data-slot="4" onclick="openCreatureSelector(2, 4)">
                            <div class="slot-empty">+</div>
                        </div>
                        <div class="army-slot" data-player="2" data-slot="5" onclick="openCreatureSelector(2, 5)">
                            <div class="slot-empty">+</div>
                        </div>
                        <div class="army-slot" data-player="2" data-slot="6" onclick="openCreatureSelector(2, 6)">
                            <div class="slot-empty">+</div>
                        </div>
                    </div>
                    <div class="army-power" id="player2-power">Сила армии: 0</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Creature Selector Modal -->
    <div id="creature-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Выбор существа</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-tabs" id="modal-faction-tabs"></div>
            <div class="creature-search">
                <input type="text" id="creature-search-input" placeholder="Поиск по имени..."
                       oninput="filterCreatures()">
            </div>
            <div class="creature-grid" id="creature-grid"></div>
        </div>
    </div>

    <!-- Creature Detail Tooltip -->
    <div id="creature-tooltip" class="tooltip" style="display:none;"></div>

    <!-- Save/Load Dialog -->
    <div id="save-dialog" class="modal" style="display:none;">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2 id="save-dialog-title">Сохранить пресет</h2>
                <button class="modal-close" onclick="closeSaveDialog()">&times;</button>
            </div>
            <div id="save-dialog-body"></div>
        </div>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="import-file-input" accept=".json" style="display:none;"
           onchange="handleImport(event)">

    <script src="/static/js/app.js"></script>
</body>
</html>
